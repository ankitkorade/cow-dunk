<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The AK COW WASTE PRODUCTS</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<!-- EmailJS -->
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  background: #f7f7f7;
}

/* HERO */
.hero {
  height: 100vh;
  background: url('https://images.unsplash.com/photo-1598514982849-1d7db9d3e8c7') center/cover no-repeat;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  color: white;
  flex-direction: column;
}

.hero h1 {
  font-size: 2.5rem;
}

.hero p {
  margin: 10px 0;
}

.hero button {
  padding: 12px 25px;
  border: none;
  background: #ff9800;
  color: white;
  font-size: 16px;
  border-radius: 25px;
  cursor: pointer;
}

/* PRODUCTS */
.products {
  padding: 20px;
}

.carousel {
  display: flex;
  overflow-x: auto;
  gap: 15px;
}

.product {
  min-width: 200px;
  background: white;
  border-radius: 10px;
  padding: 10px;
  text-align: center;
}

.product img {
  width: 100%;
  border-radius: 10px;
}

.product button {
  margin-top: 10px;
  padding: 8px;
  background: green;
  color: white;
  border: none;
  border-radius: 5px;
}

/* CART ICON */
.cart-icon {
  position: fixed;
  top: 20px;
  right: 20px;
  background: black;
  color: white;
  padding: 10px;
  border-radius: 50%;
  cursor: pointer;
}

.cart-count {
  position: absolute;
  top: -5px;
  right: -5px;
  background: red;
  border-radius: 50%;
  padding: 3px 6px;
  font-size: 12px;
}

/* CART DRAWER */
.cart {
  position: fixed;
  right: -100%;
  top: 0;
  width: 300px;
  height: 100%;
  background: white;
  padding: 20px;
  transition: 0.3s;
  overflow-y: auto;
}

.cart.active {
  right: 0;
}

.cart input {
  width: 100%;
  margin: 5px 0;
  padding: 8px;
}

.cart button {
  width: 100%;
  padding: 10px;
  background: orange;
  border: none;
  color: white;
}

/* WHATSAPP */
.whatsapp {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: green;
  color: white;
  padding: 12px;
  border-radius: 50%;
  font-size: 20px;
}
</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
  <h1>The AK COW WASTE PRODUCTS</h1>
  <p>Fresh finds in best Prices</p>
  <button onclick="scrollToProducts()">Shop Now</button>
</section>

<!-- PRODUCTS -->
<section class="products" id="products">
  <h2>Our Products</h2>
  <div class="carousel">

    <div class="product">
      <img src="https://i.ibb.co/hFJ8h6BG/cow-dunk.jpg">
      <h3>Cow Dung Cake</h3>
      <button onclick="addToCart('Cow Dung Cake')">Add</button>
    </div>

    <div class="product">
      <img src="https://i.ibb.co/yFRj5SdD/dunk-powder.jpg">
      <h3>Dung Powder</h3>
      <button onclick="addToCart('Dung Powder')">Add</button>
    </div>

    <div class="product">
      <img src="https://i.ibb.co/kVhtwcnv/cow-dung-chandan-dhoop.jpg">
      <h3>Dhoop Sticks</h3>
      <button onclick="addToCart('Dhoop Sticks')">Add</button>
    </div>

    <div class="product">
      <img src="https://i.ibb.co/BKt28Q0H/Cow-Dung-Fertilizer.png">
      <h3>Fertilizer</h3>
      <button onclick="addToCart('Fertilizer')">Add</button>
    </div>

  </div>
</section>

<!-- CART ICON -->
<div class="cart-icon" onclick="toggleCart()">
  🛒 <span class="cart-count" id="count">0</span>
</div>

<!-- CART -->
<div class="cart" id="cart">
  <h2>Your Cart</h2>
  <ul id="cartItems"></ul>

  <h3>Order Details</h3>
  <input type="text" id="name" placeholder="Your Name">
  <input type="text" id="phone" placeholder="Phone Number">

  <button onclick="sendOrder()">Send Order</button>
</div>

<!-- WHATSAPP -->
<a href="https://wa.me/9969984461" class="whatsapp">💬</a>

<script>
emailjs.init("YOUR_PUBLIC_KEY");

let cart = [];

function scrollToProducts() {
  document.getElementById("products").scrollIntoView({behavior:'smooth'});
}

function addToCart(item) {
  cart.push(item);
  updateCart();
}

function updateCart() {
  document.getElementById("count").innerText = cart.length;

  let list = document.getElementById("cartItems");
  list.innerHTML = "";
  cart.forEach(i => {
    let li = document.createElement("li");
    li.innerText = i;
    list.appendChild(li);
  });
}

function toggleCart() {
  document.getElementById("cart").classList.toggle("active");
}

function sendOrder() {
  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;

  let templateParams = {
    customer_name: name,
    phone: phone,
    order: cart.join(", ")
  };

  emailjs.send("YOUR_SERVICE_ID", "YOUR_TEMPLATE_ID", templateParams)
  .then(() => {
    alert("Order Sent Successfully!");
    cart = [];
    updateCart();
  }, (error) => {
    alert("Failed to send order");
  });
}
</script>

</body>
</html>
